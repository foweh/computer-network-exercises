<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>计算机网络习题练习 653题</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding-bottom: 100px; }

        .container { max-width: 900px; margin: 0 auto; padding: 15px; }
        .header { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header h1 { text-align: center; color: #333; font-size: 22px; margin-bottom: 10px; }
        .header p { text-align: center; color: #999; font-size: 12px; margin-bottom: 8px; }
        .stats-bar { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 8px; }
        .stat-item { text-align: center; padding: 8px 12px; background: #f8f9fa; border-radius: 8px; min-width: 70px; }
        .stat-label { font-size: 11px; color: #666; }
        .stat-value { font-size: 18px; font-weight: bold; color: #667eea; }

        .progress-info { text-align: center; color: #fff; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; margin-bottom: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #fff, #e8eaf6); border-radius: 3px; transition: width 0.5s; }

        .category-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
        .category-btn { padding: 6px 12px; border: 2px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.2); color: white; border-radius: 15px; font-size: 12px; cursor: pointer; transition: all 0.3s; }
        .category-btn.active { background: white; color: #667eea; }

        .nav-tabs { display: flex; background: rgba(255,255,255,0.95); border-radius: 16px; padding: 8px; margin-bottom: 15px; overflow-x: auto; gap: 4px; }
        .nav-tab { flex: 1; text-align: center; padding: 10px 5px; border-radius: 10px; cursor: pointer; font-weight: 500; color: #666; transition: all 0.3s; font-size: 13px; white-space: nowrap; background: transparent; border: none; }
        .nav-tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .question-card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .question-header { display: flex; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 6px; }
        .question-type { padding: 3px 10px; border-radius: 15px; font-size: 11px; font-weight: 500; }
        .type-单选题 { background: #e3f2fd; color: #1976d2; }
        .type-多选题 { background: #ede7f6; color: #5e35b1; }
        .type-判断题 { background: #e8f5e9; color: #388e3c; }
        .type-填空题 { background: #fff3e0; color: #f57c00; }
        .type-计算题 { background: #fce4ec; color: #c2185b; }
        .type-简答题 { background: #e8eaf6; color: #303f9f; }
        .type-案例分析题 { background: #f3e5f5; color: #7b1fa2; }
        .question-number { font-weight: 600; color: #333; font-size: 14px; }
        .question-section { font-size: 11px; color: #999; margin-left: 4px; }
        .question-content { font-size: 15px; line-height: 1.7; color: #333; margin-bottom: 14px; white-space: pre-wrap; }
        .options { list-style: none; }
        .option-item { padding: 10px 12px; margin-bottom: 8px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 14px; display: flex; align-items: center; }
        .option-item:hover { border-color: #667eea; background: #f5f3ff; }
        .option-item.selected { border-color: #667eea; background: #e8eaf6; }
        .option-item.correct { border-color: #4caf50; background: #e8f5e9; }
        .option-item.incorrect { border-color: #f44336; background: #ffebee; }
        .option-label { width: 26px; height: 26px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-weight: 600; color: #666; font-size: 13px; flex-shrink: 0; }
        .option-item.selected .option-label { background: #667eea; color: white; }
        .option-item.correct .option-label { background: #4caf50; color: white; }
        .option-item.incorrect .option-label { background: #f44336; color: white; }

        .fill-input, .text-input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: all 0.3s; margin-bottom: 8px; }
        .fill-input:focus, .text-input:focus { outline: none; border-color: #667eea; }
        .fill-input.correct, .text-input.correct { border-color: #4caf50; background: #e8f5e9; }
        .fill-input.incorrect, .text-input.incorrect { border-color: #f44336; background: #ffebee; }
        textarea.text-input { min-height: 100px; resize: vertical; font-family: inherit; }

        .answer-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid #eee; }
        .answer-label { font-weight: 600; color: #667eea; margin-bottom: 6px; display: block; font-size: 14px; }
        .answer-content { color: #333; line-height: 1.7; font-size: 14px; white-space: pre-wrap; }
        .answer-content .my-answer { color: #c62828; }
        .answer-content .my-answer.correct-match { color: #2e7d32; }
        .action-buttons { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-danger { background: #f44336; color: white; }
        .btn-success { background: #4caf50; color: white; }
        .btn-warn { background: #ff9800; color: white; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }

        .result-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
        .result-modal.active { display: flex; }
        .result-content { background: white; border-radius: 16px; padding: 25px; max-width: 360px; width: 85%; text-align: center; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .result-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 35px; }
        .result-icon.success { background: #e8f5e9; color: #4caf50; }
        .result-icon.error { background: #ffebee; color: #f44336; }
        .result-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #333; }
        .result-text { color: #666; margin-bottom: 18px; font-size: 14px; }

        .empty-state { text-align: center; padding: 50px 20px; color: white; }
        .empty-state-inner { background: rgba(255,255,255,0.9); border-radius: 16px; padding: 40px 20px; color: #666; }

        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); padding: 10px 8px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); display: flex; justify-content: space-around; z-index: 100; }
        .footer-btn { display: flex; flex-direction: column; align-items: center; color: #666; cursor: pointer; transition: all 0.3s; border: none; background: none; }
        .footer-btn.active { color: #667eea; }
        .footer-btn span:first-child { font-size: 22px; margin-bottom: 3px; }
        .footer-btn span:last-child { font-size: 11px; }

        .drop-zone {
            border: 2px dashed rgba(255,255,255,0.6); border-radius: 12px; padding: 30px; text-align: center;
            color: rgba(255,255,255,0.9); cursor: pointer; transition: .2s; margin-bottom: 12px; background: rgba(255,255,255,0.1);
        }
        .drop-zone:hover { border-color: #fff; background: rgba(255,255,255,0.2); }
        .danger-zone { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.3); }
        .danger-zone p { color: rgba(255,255,255,0.7); font-size: 12px; margin-bottom: 8px; }

        .exam-setup { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .exam-setup label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
        .exam-setup input, .exam-setup select { padding: 8px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
        .exam-setup input:focus, .exam-setup select:focus { border-color: #667eea; }

        @media (max-width: 768px) {
            .container { padding: 8px; }
            .header h1 { font-size: 18px; }
            .question-card { padding: 14px; }
            .question-content { font-size: 14px; }
            .option-item { padding: 8px 10px; font-size: 13px; }
            .btn { padding: 8px 16px; font-size: 13px; }
            .nav-tab { font-size: 11px; padding: 8px 3px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header" id="header-area">
        <h1>📚 计算机网络习题练习</h1>
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-label">题库总量</div><div class="stat-value" id="total-count">0</div></div>
            <div class="stat-item"><div class="stat-label">已做题目</div><div class="stat-value" id="total-done">0</div></div>
            <div class="stat-item"><div class="stat-label">正确率</div><div class="stat-value" id="accuracy">0%</div></div>
            <div class="stat-item"><div class="stat-label">错题数量</div><div class="stat-value" id="wrong-count">0</div></div>
            <div class="stat-item"><div class="stat-label">连续正确</div><div class="stat-value" id="streak">0</div></div>
        </div>
    </div>

    <div class="progress-info" id="progress-info" style="display:none;"></div>
    <div class="progress-bar" id="progress-bar-wrap" style="display:none;"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="category-filter" id="category-filter"></div>

    <div class="nav-tabs">
        <button class="nav-tab active" data-tab="practice">📝 练习</button>
        <button class="nav-tab" data-tab="exam">✍️ 考试</button>
        <button class="nav-tab" data-tab="review">📖 错题</button>
        <button class="nav-tab" data-tab="manage">⚙️ 管理</button>
    </div>

    <!-- 练习 Tab -->
    <div class="tab-content active" id="practice-tab">
        <div id="question-list"></div>
        <div class="empty-state" id="practice-empty"><div class="empty-state-inner"><h3>📁 题库为空</h3><p style="margin-top:8px;">请先在「⚙️ 管理」中导入题库</p></div></div>
    </div>

    <!-- 考试 Tab -->
    <div class="tab-content" id="exam-tab">
        <div class="exam-setup" id="exam-setup" style="display:none;">
            <h3 style="margin-bottom:14px;color:#667eea;">⚙️ 考试设置</h3>
            <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;">
                <div style="flex:1;min-width:100px;"><label>题目数量</label><input type="number" id="exam-count" value="20" min="1" max="500"></div>
                <div style="flex:1;min-width:100px;"><label>题型筛选</label><select id="exam-type"><option value="">全部题型</option></select></div>
                <div style="flex:1;min-width:100px;"><label>排序</label><select id="exam-order"><option value="random">随机抽取</option><option value="sequential">顺序出题</option></select></div>
                <div><button class="btn btn-primary" id="btn-start-exam" style="margin-top:18px;">🚀 开始</button></div>
            </div>
        </div>
        <div id="exam-area"></div>
        <div class="action-buttons" id="exam-nav" style="display:none;justify-content:center;margin-top:8px;">
            <button class="btn btn-secondary btn-sm" id="btn-prev-q" disabled>◀ 上一题</button>
            <span style="padding:6px 14px;color:#fff;font-size:13px;" id="exam-progress-text"></span>
            <button class="btn btn-primary btn-sm" id="btn-next-q">下一题 ▶</button>
            <button class="btn btn-danger btn-sm" id="btn-submit-exam">📩 交卷</button>
        </div>
    </div>

    <!-- 错题 Tab -->
    <div class="tab-content" id="review-tab">
        <div id="wrong-list"></div>
        <div class="empty-state" id="wrong-empty"><div class="empty-state-inner"><h3>🎉 太棒了！</h3><p>错题本为空</p></div></div>
        <div class="action-buttons" id="wrong-actions" style="display:none;justify-content:center;margin-top:12px;">
            <button class="btn btn-primary btn-sm" id="btn-retry-errors">🔄 重新练习错题</button>
            <button class="btn btn-danger btn-sm" id="btn-clear-errors">🗑 清空错题本</button>
        </div>
    </div>

    <!-- 管理 Tab -->
    <div class="tab-content" id="manage-tab">
        <div class="question-card">
            <h3 style="margin-bottom:14px;color:#667eea;">📥 导入题库</h3>
            <div class="drop-zone" id="drop-zone">
                <p style="font-size:36px;margin-bottom:8px;">📁</p>
                <p>拖拽JSON文件到此处，或点击选择文件</p>
                <p style="font-size:12px;margin-top:4px;opacity:0.7;">支持由油猴脚本导出的题库JSON</p>
            </div>
            <input type="file" id="file-input" accept=".json" style="display:none;">
            <div class="action-buttons">
                <button class="btn btn-primary btn-sm" id="btn-export-bank">📤 导出题库JSON</button>
                <button class="btn btn-success btn-sm" id="btn-load-merged">📦 加载内置合并题库</button>
            </div>
        </div>
        <div class="danger-zone" style="margin-top:16px;">
            <p style="color:rgba(255,255,255,0.7);">数据管理（操作不可恢复）</p>
            <div class="action-buttons">
                <button class="btn btn-warn btn-sm" id="btn-clear-progress">🗑 清除练习记录</button>
                <button class="btn btn-danger btn-sm" id="btn-clear-all">⚠️ 清除所有数据</button>
            </div>
            <p style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;">「清除练习记录」保留错题本；「清除所有」含错题本</p>
        </div>
    </div>
</div>

<!-- 底部导航 -->
<div class="footer">
    <button class="footer-btn active" data-tab="practice"><span>📝</span><span>练习</span></button>
    <button class="footer-btn" data-tab="exam"><span>✍️</span><span>考试</span></button>
    <button class="footer-btn" data-tab="review"><span>📖</span><span>错题</span></button>
    <button class="footer-btn" data-tab="manage"><span>⚙️</span><span>管理</span></button>
</div>

<!-- 结果弹窗 -->
<div class="result-modal" id="result-modal">
    <div class="result-content">
        <div class="result-icon" id="result-icon">✓</div>
        <div class="result-title" id="result-title"></div>
        <div class="result-text" id="result-text"></div>
        <button class="btn btn-primary" onclick="closeModal()">确定</button>
    </div>
</div>

<script>
// ═══════════════════════════ 数据层 ═══════════════════════════
const BANK_KEY = 'questionBank';
const PROGRESS_KEY = 'userProgress';
const WRONG_KEY = 'wrongQuestions';
const STATS_KEY = 'studyStats';
const MERGED_URL = 'merged.json';

let questions = [];
let userProgress = {};
let wrongQuestions = [];
let studyStats = { total: 0, correct: 0, wrong: 0, maxStreak: 0, currentStreak: 0, typeStats: {} };

function loadData() {
    try { questions = JSON.parse(localStorage.getItem(BANK_KEY) || '[]'); } catch(e) { questions = []; }
    try { userProgress = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); } catch(e) { userProgress = {}; }
    try { wrongQuestions = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]'); } catch(e) { wrongQuestions = []; }
    try { studyStats = JSON.parse(localStorage.getItem(STATS_KEY) || '{"total":0,"correct":0,"wrong":0,"maxStreak":0,"currentStreak":0,"typeStats":{}}'); } catch(e) {}
    if (!studyStats.typeStats) studyStats.typeStats = {};
}

function saveAll() {
    localStorage.setItem(BANK_KEY, JSON.stringify(questions));
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(userProgress));
    localStorage.setItem(WRONG_KEY, JSON.stringify(wrongQuestions));
    localStorage.setItem(STATS_KEY, JSON.stringify(studyStats));
}

function saveBank() { localStorage.setItem(BANK_KEY, JSON.stringify(questions)); }
function saveProgress() { localStorage.setItem(PROGRESS_KEY, JSON.stringify(userProgress)); }
function saveWrong() { localStorage.setItem(WRONG_KEY, JSON.stringify(wrongQuestions)); }
function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(studyStats)); }

// 去重
function normalize(s) { return (s || '').replace(/[\n\t\r]+/g, ' ').replace(/\s+/g, ' ').trim(); }
function contentKey(q) { return normalize(q.stem || q.content) + '|||' + normalize(q.type || q.category) + '|||' + normalize(q.answer); }

// 题型归一化
function normalizeType(t) {
    if (!t) return '简答题';
    t = t.replace(/[()（）]/g, '').trim();
    if (/单/.test(t)) return '单选题';
    if (/多/.test(t)) return '多选题';
    if (/判断/.test(t)) return '判断题';
    if (/填空/.test(t)) return '填空题';
    if (/简答|问答|名词解释/.test(t)) return '简答题';
    if (/计算/.test(t)) return '计算题';
    if (/案例.*分析|分析.*案例/.test(t)) return '案例分析题';
    if (/统考/.test(t)) return '单选题';
    return '简答题';
}

// ═══════════════════════════ 导入/合并 ═══════════════════════════
function mergeBank(incoming) {
    const keySet = new Set(questions.map(contentKey));
    let added = 0;
    incoming.forEach(q => {
        // 统一字段名
        if (!q.stem && q.content) q.stem = q.content;
        if (!q.type && q.category) q.type = q.category;
        if (!q.options && q.choices) q.options = q.choices;
        q.type = normalizeType(q.type);

        const k = contentKey(q);
        if (!keySet.has(k)) {
            keySet.add(k);
            questions.push(q);
            added++;
        } else {
            // 补齐缺失字段
            const existing = questions.find(e => contentKey(e) === k);
            if (existing) {
                if (q.analysis && !existing.analysis) existing.analysis = q.analysis;
                if (q.options && !existing.options) existing.options = q.options;
            }
        }
    });
    saveBank();
    return added;
}

function importJSON(jsonStr) {
    let incoming;
    try { incoming = JSON.parse(jsonStr); } catch(e) { throw new Error('JSON格式错误'); }
    if (!Array.isArray(incoming)) throw new Error('需要数组格式');
    return mergeBank(incoming);
}

async function loadMergedJSON() {
    try {
        const resp = await fetch(MERGED_URL);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const json = await resp.text();
        const added = importJSON(json);
        alert(`✅ 已加载内置题库，新增 ${added} 题，题库共 ${questions.length} 题`);
        refreshAll();
    } catch(e) {
        alert('❌ 加载失败: ' + e.message + '\n请确保 merged.json 与此页面在同一目录');
    }
}

// ═══════════════════════════ 渲染层 ═══════════════════════════
function getFilteredQuestions(category) {
    if (!category || category === 'all') return questions;
    return questions.filter(q => (q.type || q.category) === category);
}

function getAnswerContent(q) {
    return q.answer || q.correctAnswer || '';
}

function renderQuestion(q, qId, container, showResult) {
    const id = qId;
    const up = userProgress[id] || {};
    const userAnswer = up.answer || '';
    const isCorrect = up.correct;
    const show = showResult || (isCorrect !== undefined && isCorrect !== null);
    const type = q.type || q.category || '简答题';
    const answerContent = getAnswerContent(q);
    const stem = q.stem || q.content || '';

    let html = `<div class="question-card" data-id="${id}">`;
    html += `<div class="question-header">`;
    html += `<span class="question-type type-${type}">${type}</span>`;
    html += `<span class="question-number">第${id}题</span>`;
    if (q.section) html += `<span class="question-section">${q.section}</span>`;
    html += `</div>`;
    html += `<div class="question-content">${escapeHtml(stem)}</div>`;

    // 选项
    if ((type === '单选题' || type === '多选题' || type === '判断题') && q.options && q.options.length) {
        html += `<ul class="options">`;
        const isMulti = type === '多选题';
        q.options.forEach(opt => {
            const label = opt.label || opt;
            const text = opt.text || opt;
            let cls = 'option-item';
            if (show) {
                const isCorrectOpt = answerContent.includes(label);
                const isSelectedWrong = userAnswer && userAnswer.includes(label) && !isCorrectOpt;
                if (isCorrectOpt) cls += ' correct';
                else if (isSelectedWrong) cls += ' incorrect';
                else if (userAnswer && userAnswer.includes(label)) cls += ' selected';
            } else if (userAnswer && userAnswer.includes(label)) {
                cls += ' selected';
            }
            html += `<li class="${cls}" data-label="${escapeHtml(label)}">`;
            html += `<span class="option-label">${escapeHtml(label)}</span>${escapeHtml(text)}</li>`;
        });
        html += `</ul>`;
    } else if (type === '填空题') {
        html += `<input type="text" class="fill-input" placeholder="请输入答案" value="${escapeHtml(userAnswer)}" 
            ${show ? 'readonly ' + (isCorrect ? 'class="fill-input correct"' : 'class="fill-input incorrect"') : ''}>`;
    } else {
        html += `<textarea class="text-input" placeholder="请输入答案" ${show ? 'readonly' : ''}>${escapeHtml(userAnswer)}</textarea>`;
    }

    // 答案/解析
    if (show) {
        html += `<div class="answer-section">`;
        html += `<div class="answer-label">✅ 正确答案</div>`;
        html += `<div class="answer-content">${escapeHtml(answerContent)}</div>`;
        if (userAnswer && type !== '简答题' && type !== '计算题') {
            const matchClass = isCorrect ? 'correct-match' : '';
            html += `<div class="answer-content"><span class="my-answer ${matchClass}">你的答案: ${escapeHtml(userAnswer)}</span></div>`;
        }
        if (q.analysis || q.explanation) {
            html += `<div class="answer-label" style="margin-top:8px;">💡 解析</div>`;
            html += `<div class="answer-content">${escapeHtml(q.analysis || q.explanation)}</div>`;
        }
        html += `</div>`;
    }

    // 操作按钮
    if (!show) {
        html += `<div class="action-buttons">`;
        html += `<button class="btn btn-primary btn-sm submit-btn">✔ 提交答案</button>`;
        html += `<button class="btn btn-secondary btn-sm show-ans-btn">👁 查看答案</button>`;
        html += `</div>`;
    }

    html += `</div>`;
    return html;
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ═══════════════════════════ 练习模式 ═══════════════════════════
let currentCategory = 'all';
let currentExamState = null;

function refreshPractice() {
    const filtered = getFilteredQuestions(currentCategory);
    const container = document.getElementById('question-list');
    const empty = document.getElementById('practice-empty');

    if (questions.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
    }

    empty.style.display = 'none';
    container.innerHTML = '';
    filtered.forEach(q => {
        const qId = questions.indexOf(q) + 1;
        container.innerHTML += renderQuestion(q, qId, container, false);
    });

    // 绑定事件
    container.querySelectorAll('.question-card').forEach(card => {
        const qId = parseInt(card.dataset.id);
        const q = questions[qId - 1];
        const type = q.type || q.category || '简答题';

        // 选项点击
        card.querySelectorAll('.option-item').forEach(opt => {
            opt.addEventListener('click', () => {
                if (userProgress[qId] && userProgress[qId].correct !== undefined) return;
                const label = opt.dataset.label;
                if (type === '多选题') {
                    let arr = (userProgress[qId]?.answer || '').split('');
                    const idx = arr.indexOf(label);
                    if (idx >= 0) arr.splice(idx, 1); else arr.push(label);
                    arr.sort();
                    userProgress[qId] = { answer: arr.join(''), correct: null };
                    card.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
                    arr.forEach(l => {
                        card.querySelector(`.option-item[data-label="${l}"]`)?.classList.add('selected');
                    });
                } else {
                    userProgress[qId] = { answer: label, correct: null };
                    card.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                }
                saveProgress();
            });
        });

        // 填空/简答输入
        const input = card.querySelector('.fill-input') || card.querySelector('.text-input');
        if (input) {
            input.addEventListener('input', () => {
                userProgress[qId] = { answer: input.value, correct: null };
                saveProgress();
            });
        }

        // 提交按钮
        const submitBtn = card.querySelector('.submit-btn');
        if (submitBtn) {
            submitBtn.addEventListener('click', () => submitAnswer(qId, type, card));
        }

        // 查看答案
        const showBtn = card.querySelector('.show-ans-btn');
        if (showBtn) {
            showBtn.addEventListener('click', () => showAnswer(qId, card));
        }
    });

    updateStats();
}

function submitAnswer(qId, type, card) {
    if (!userProgress[qId] || !userProgress[qId].answer) {
        alert('请先作答！');
        return;
    }
    const up = userProgress[qId];
    const q = questions[qId - 1];
    const answerContent = getAnswerContent(q);
    let isCorrect;

    if (type === '单选题' || type === '判断题') {
        isCorrect = (up.answer || '').trim() === (answerContent || '').trim();
    } else if (type === '多选题') {
        const user = (up.answer || '').split('').sort().join('');
        const correct = (answerContent || '').replace(/\s/g, '');
        isCorrect = user === correct;
    } else if (type === '填空题') {
        const ua = (up.answer || '').toLowerCase();
        const ca = (answerContent || '').toLowerCase();
        isCorrect = ca.includes(ua) || ua.includes(ca);
    } else {
        isCorrect = true; // 简答/计算 不自动判分
    }

    userProgress[qId] = { ...up, correct: isCorrect };
    saveProgress();
    updateStudyStats(q, isCorrect);
    card.outerHTML = renderQuestion(q, qId, card.parentElement, true);
    bindPracticeCardEvents(qId);
    showResultModal(isCorrect);
}

function showAnswer(qId, card) {
    const q = questions[qId - 1];
    userProgress[qId] = { answer: userProgress[qId]?.answer || '', correct: false };
    saveProgress();
    updateStudyStats(q, false);
    card.outerHTML = renderQuestion(q, qId, card.parentElement, true);
    bindPracticeCardEvents(qId);
}

function bindPracticeCardEvents(qId) {
    // 已展示答案的卡片不需要再绑定事件，但需要更新统计
    updateStats();
}

function updateStudyStats(q, isCorrect) {
    studyStats.total++;
    if (isCorrect) {
        studyStats.correct++;
        studyStats.currentStreak++;
        if (studyStats.currentStreak > studyStats.maxStreak) studyStats.maxStreak = studyStats.currentStreak;
        // 从错题本移除
        const widx = wrongQuestions.findIndex(w => contentKey(w) === contentKey(q));
        if (widx > -1) wrongQuestions.splice(widx, 1);
    } else {
        studyStats.wrong++;
        studyStats.currentStreak = 0;
        // 加入错题本
        if (!wrongQuestions.find(w => contentKey(w) === contentKey(q))) {
            wrongQuestions.push({ ...q, _userAnswer: userProgress[questions.indexOf(q) + 1]?.answer || '' });
        }
    }

    const type = q.type || q.category || '简答题';
    if (!studyStats.typeStats[type]) studyStats.typeStats[type] = { correct: 0, total: 0 };
    studyStats.typeStats[type].total++;
    if (isCorrect) studyStats.typeStats[type].correct++;

    saveStats();
    saveWrong();
}

// ═══════════════════════════ 统计更新 ═══════════════════════════
function updateStats() {
    const answered = questions.filter((q, i) => userProgress[i + 1] && userProgress[i + 1].correct !== undefined).length;
    const correct = questions.filter((q, i) => userProgress[i + 1] && userProgress[i + 1].correct === true).length;
    const acc = answered > 0 ? Math.round((correct / answered) * 100) : 0;

    document.getElementById('total-count').textContent = questions.length;
    document.getElementById('total-done').textContent = answered;
    document.getElementById('accuracy').textContent = acc + '%';
    document.getElementById('wrong-count').textContent = wrongQuestions.length;
    document.getElementById('streak').textContent = studyStats.currentStreak || 0;

    // 进度条
    const filtered = getFilteredQuestions(currentCategory);
    const filteredAnswered = filtered.filter((q, i) => {
        const qId = questions.indexOf(q) + 1;
        return userProgress[qId] && userProgress[qId].correct !== undefined;
    }).length;
    if (filtered.length > 0 && filteredAnswered > 0) {
        document.getElementById('progress-info').style.display = 'block';
        document.getElementById('progress-bar-wrap').style.display = 'block';
        document.getElementById('progress-info').textContent = `练习进度: ${filteredAnswered}/${filtered.length}`;
        document.getElementById('progress-fill').style.width = Math.round(filteredAnswered / filtered.length * 100) + '%';
    } else {
        document.getElementById('progress-info').style.display = 'none';
        document.getElementById('progress-bar-wrap').style.display = 'none';
    }
}

// ═══════════════════════════ 弹窗 ═══════════════════════════
function showResultModal(isCorrect) {
    const modal = document.getElementById('result-modal');
    document.getElementById('result-icon').className = 'result-icon ' + (isCorrect ? 'success' : 'error');
    document.getElementById('result-icon').textContent = isCorrect ? '✓' : '✗';
    document.getElementById('result-title').textContent = isCorrect ? '回答正确！' : '回答错误';
    document.getElementById('result-text').textContent = isCorrect ? '太棒了，继续加油！' : '不要灰心，再接再厉！';
    modal.classList.add('active');
}

function closeModal() {
    document.getElementById('result-modal').classList.remove('active');
}

// ═══════════════════════════ 考试模式 ═══════════════════════════
function startExam() {
    let pool = [...questions];
    const typeFilter = document.getElementById('exam-type').value;
    if (typeFilter) pool = pool.filter(q => (q.type || q.category) === typeFilter);
    if (!pool.length) { alert('没有匹配的题目！'); return; }

    let count = parseInt(document.getElementById('exam-count').value) || 20;
    count = Math.min(count, pool.length);

    const order = document.getElementById('exam-order').value;
    let selected;
    if (order === 'random') {
        selected = pool.sort(() => Math.random() - 0.5).slice(0, count);
    } else {
        selected = pool.slice(0, count);
    }

    currentExamState = {
        questions: selected,
        currentIndex: 0,
        userAnswers: new Array(selected.length).fill(''),
        showAnswers: new Array(selected.length).fill(false),
        submitted: false
    };

    document.getElementById('exam-setup').style.display = 'none';
    document.getElementById('exam-nav').style.display = 'flex';
    renderExamQuestion();
}

function renderExamQuestion() {
    if (!currentExamState) return;
    const idx = currentExamState.currentIndex;
    const q = currentExamState.questions[idx];
    const total = currentExamState.questions.length;
    const userAns = currentExamState.userAnswers[idx];
    const showAns = currentExamState.showAnswers[idx];
    const type = q.type || q.category || '简答题';
    const stem = q.stem || q.content || '';

    let html = `<div class="question-card">`;
    html += `<div class="question-header">`;
    html += `<span class="question-type type-${type}">${type}</span>`;
    html += `<span class="question-number">第${idx + 1}/${total} 题</span>`;
    html += `</div>`;
    html += `<div class="question-content">${escapeHtml(stem)}</div>`;

    if ((type === '单选题' || type === '多选题' || type === '判断题') && q.options && q.options.length) {
        const isMulti = type === '多选题';
        html += `<ul class="options">`;
        q.options.forEach(opt => {
            const label = opt.label || opt;
            const text = opt.text || opt;
            let cls = 'option-item';
            const selected = isMulti ? (userAns || '').includes(label) : userAns === label;
            if (selected) cls += ' selected';
            if (showAns) {
                const isCorrectOpt = (q.answer || '').includes(label);
                const isWrongSel = selected && !isCorrectOpt;
                if (isCorrectOpt) cls += ' correct';
                else if (isWrongSel) cls += ' incorrect';
            }
            html += `<li class="${cls}" data-label="${escapeHtml(label)}">`;
            html += `<span class="option-label">${escapeHtml(label)}</span>${escapeHtml(text)}</li>`;
        });
        html += `</ul>`;
    } else if (type === '填空题') {
        html += `<input type="text" class="fill-input" id="exam-input" value="${escapeHtml(userAns)}" 
            placeholder="请输入答案" ${showAns ? 'readonly' : ''}>`;
    } else {
        html += `<textarea class="text-input" id="exam-input" placeholder="请输入答案" ${showAns ? 'readonly' : ''}
            rows="3">${escapeHtml(userAns)}</textarea>`;
    }

    if (showAns) {
        html += `<div class="answer-section">`;
        html += `<div class="answer-label">✅ 正确答案</div>`;
        html += `<div class="answer-content">${escapeHtml(q.answer || '')}</div>`;
        if (q.analysis) html += `<div class="answer-content" style="margin-top:8px;">💡 ${escapeHtml(q.analysis)}</div>`;
        html += `</div>`;
    }

    html += `<div class="action-buttons" style="margin-top:8px;">`;
    if (!showAns) {
        html += `<button class="btn btn-secondary btn-sm" id="btn-show-ans">👁 查看答案</button>`;
    } else {
        html += `<button class="btn btn-secondary btn-sm" id="btn-hide-ans">🙈 隐藏答案</button>`;
    }
    html += `</div>`;
    html += `</div>`;

    document.getElementById('exam-area').innerHTML = html;

    document.getElementById('exam-progress-text').textContent = `${idx + 1} / ${total}`;
    document.getElementById('btn-prev-q').disabled = idx === 0;
    if (idx >= total - 1) {
        document.getElementById('btn-next-q').textContent = '📩 交卷';
        document.getElementById('btn-next-q').className = 'btn btn-danger btn-sm';
    } else {
        document.getElementById('btn-next-q').textContent = '下一题 ▶';
        document.getElementById('btn-next-q').className = 'btn btn-primary btn-sm';
    }

    bindExamEvents(idx, type);
}

function bindExamEvents(idx, type) {
    const card = document.getElementById('exam-area').querySelector('.question-card');
    if (!card) return;

    // 选项点击
    card.querySelectorAll('.option-item').forEach(opt => {
        opt.addEventListener('click', () => {
            if (currentExamState.showAnswers[idx] || currentExamState.submitted) return;
            const label = opt.dataset.label;
            if (type === '多选题') {
                let arr = (currentExamState.userAnswers[idx] || '').split('').filter(a => a);
                const pos = arr.indexOf(label);
                if (pos >= 0) arr.splice(pos, 1); else arr.push(label);
                arr.sort();
                currentExamState.userAnswers[idx] = arr.join('');
            } else {
                currentExamState.userAnswers[idx] = label;
            }
            renderExamQuestion();
        });
    });

    // 输入
    const input = document.getElementById('exam-input');
    if (input && !currentExamState.showAnswers[idx] && !currentExamState.submitted) {
        input.addEventListener('input', () => {
            currentExamState.userAnswers[idx] = input.value;
        });
    }

    // 显示/隐藏答案
    const showBtn = document.getElementById('btn-show-ans');
    const hideBtn = document.getElementById('btn-hide-ans');
    if (showBtn) showBtn.addEventListener('click', () => {
        currentExamState.showAnswers[idx] = true;
        // 先保存输入
        const inp = document.getElementById('exam-input');
        if (inp) currentExamState.userAnswers[idx] = inp.value;
        renderExamQuestion();
    });
    if (hideBtn) hideBtn.addEventListener('click', () => {
        currentExamState.showAnswers[idx] = false;
        renderExamQuestion();
    });
}

document.getElementById('btn-start-exam').addEventListener('click', startExam);

document.getElementById('btn-next-q').addEventListener('click', () => {
    if (!currentExamState) return;
    const idx = currentExamState.currentIndex;
    const input = document.getElementById('exam-input');
    if (input) currentExamState.userAnswers[idx] = input.value;

    if (idx >= currentExamState.questions.length - 1) {
        submitExam();
    } else {
        currentExamState.currentIndex++;
        renderExamQuestion();
    }
});

document.getElementById('btn-prev-q').addEventListener('click', () => {
    if (!currentExamState || currentExamState.currentIndex <= 0) return;
    const idx = currentExamState.currentIndex;
    const input = document.getElementById('exam-input');
    if (input) currentExamState.userAnswers[idx] = input.value;
    currentExamState.currentIndex--;
    renderExamQuestion();
});

document.getElementById('btn-submit-exam').addEventListener('click', () => {
    if (!currentExamState || currentExamState.submitted) return;
    if (confirm('确定交卷吗？')) submitExam();
});

function submitExam() {
    if (!currentExamState || currentExamState.submitted) return;
    const idx = currentExamState.currentIndex;
    const input = document.getElementById('exam-input');
    if (input) currentExamState.userAnswers[idx] = input.value;

    let correctCount = 0;
    const total = currentExamState.questions.length;

    currentExamState.questions.forEach((q, i) => {
        const userAns = currentExamState.userAnswers[i];
        const ans = q.answer || '';
        const type = q.type || q.category || '简答题';
        let isCorrect;

        if (type === '单选题' || type === '判断题') {
            isCorrect = (userAns || '').trim() === ans.trim();
        } else if (type === '多选题') {
            isCorrect = (userAns || '').split('').sort().join('') === ans.replace(/\s/g, '');
        } else if (type === '填空题') {
            isCorrect = (ans.toLowerCase().includes((userAns || '').toLowerCase()) || (userAns || '').toLowerCase().includes(ans.toLowerCase()));
        } else {
            isCorrect = true;
        }

        if (isCorrect) {
            correctCount++;
            const widx = wrongQuestions.findIndex(w => contentKey(w) === contentKey(q));
            if (widx > -1) wrongQuestions.splice(widx, 1);
        } else {
            if (!wrongQuestions.find(w => contentKey(w) === contentKey(q))) {
                wrongQuestions.push({ ...q, _userAnswer: userAns });
            }
        }
    });

    saveWrong();
    currentExamState.submitted = true;
    const score = Math.round(correctCount / total * 100);

    // 显示最后一题+答案
    currentExamState.showAnswers[currentExamState.currentIndex] = true;
    renderExamQuestion();

    document.getElementById('exam-setup').style.display = 'block';
    document.getElementById('btn-next-q').textContent = '已完成';
    document.getElementById('btn-next-q').disabled = true;

    // 弹窗
    document.getElementById('result-icon').className = 'result-icon ' + (score >= 60 ? 'success' : 'error');
    document.getElementById('result-icon').textContent = score >= 60 ? '✓' : '✗';
    document.getElementById('result-title').textContent = '考试完成！';
    document.getElementById('result-text').textContent = `得分: ${score}分 (${correctCount}/${total})`;
    document.getElementById('result-modal').classList.add('active');
}

// ═══════════════════════════ 错题本 ═══════════════════════════
function refreshWrongTab() {
    const container = document.getElementById('wrong-list');
    const empty = document.getElementById('wrong-empty');
    const actions = document.getElementById('wrong-actions');

    if (wrongQuestions.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        actions.style.display = 'none';
    } else {
        empty.style.display = 'none';
        actions.style.display = 'flex';
        container.innerHTML = '';
        wrongQuestions.forEach((q, i) => {
            const disp = { ...q, stem: q.stem || q.content, type: q.type || q.category };
            container.innerHTML += renderQuestion(disp, i + 1, container, true);
        });
    }
}

document.getElementById('btn-retry-errors').addEventListener('click', () => {
    if (!wrongQuestions.length) return;
    const pool = wrongQuestions.map(e => {
        const { _userAnswer, ...q } = e;
        return q;
    });
    currentExamState = {
        questions: pool.sort(() => Math.random() - 0.5),
        currentIndex: 0,
        userAnswers: new Array(pool.length).fill(''),
        showAnswers: new Array(pool.length).fill(false),
        submitted: false
    };
    switchTab('exam');
    document.getElementById('exam-setup').style.display = 'none';
    document.getElementById('exam-nav').style.display = 'flex';
    renderExamQuestion();
});

document.getElementById('btn-clear-errors').addEventListener('click', () => {
    if (confirm('确定清空所有错题吗？')) {
        wrongQuestions = [];
        saveWrong();
        refreshWrongTab();
        updateStats();
    }
});

function processFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
        try {
            const added = importJSON(reader.result);
            alert(`导入成功！新增 ${added} 题，题库共 ${questions.length} 题（自动去重）`);
            refreshAll();
        } catch(e) {
            alert('导入失败: ' + e.message);
        }
    };
    reader.readAsText(file);
}

// ═══════════════════════════ 导航 ═══════════════════════════
let currentTab = 'practice';

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab, .footer-btn').forEach(b => {
        b.classList.remove('active');
        if (b.dataset.tab === tab) b.classList.add('active');
    });

    const tabEl = document.getElementById(tab + '-tab');
    if (tabEl) tabEl.classList.add('active');

    if (tab === 'practice') {
        buildCategoryFilter();
        refreshPractice();
    } else if (tab === 'exam') {
        buildExamTypeSelect();
        document.getElementById('exam-setup').style.display = 'block';
        if (!currentExamState) {
            document.getElementById('exam-area').innerHTML = '';
            document.getElementById('exam-nav').style.display = 'none';
        }
    } else if (tab === 'review') {
        refreshWrongTab();
    }
}

function buildCategoryFilter() {
    const types = [...new Set(questions.map(q => q.type || q.category))].filter(Boolean);
    const container = document.getElementById('category-filter');
    container.innerHTML = '<button class="category-btn active" data-category="all">全部</button>';
    types.forEach(t => {
        container.innerHTML += `<button class="category-btn" data-category="${t}">${t}</button>`;
    });

    container.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            container.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            refreshPractice();
        });
    });
}

function buildExamTypeSelect() {
    const types = [...new Set(questions.map(q => q.type || q.category))].filter(Boolean);
    const sel = document.getElementById('exam-type');
    sel.innerHTML = '<option value="">全部题型</option>';
    types.forEach(t => { sel.innerHTML += `<option value="${t}">${t}</option>`; });
}

function refreshAll() {
    buildCategoryFilter();
    buildExamTypeSelect();
    refreshPractice();
    refreshWrongTab();
    updateStats();
}

// 导航事件
document.querySelectorAll('.nav-tab, .footer-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ═══════════════════════════ 键盘快捷键 ═══════════════════════════
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (!currentExamState || currentExamState.submitted) return;
    if (e.key === 'ArrowLeft' || e.key === 'a') {
        e.preventDefault();
        document.getElementById('btn-prev-q')?.click();
    }
    if (e.key === 'ArrowRight' || e.key === 'd') {
        e.preventDefault();
        document.getElementById('btn-next-q')?.click();
    }
});

// ═══════════════════════════ 初始化 ═══════════════════════════
loadData();
refreshAll();
</script>
</body>
</html>
